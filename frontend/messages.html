<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Mailbox</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/common.js"></script>
  <style>
   
    
    #toastContainer { position: fixed; top: 80px; right: 20px; z-index: 2000; }
    .toast {
      background: #1a73e8; color: white; padding: 12px 20px; margin-top: 10px;
      border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      font-size: 14px; animation: slideIn 0.4s ease, fadeOut 0.5s ease 4.5s forwards;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }
    body {
  background: #B7E0FF;
  font-family: "Poppins", sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* fixed header */
#header {
  width: 100%;
  background: #1e3a8a;
  color: white;
  padding: 15px 0;
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* main layout centered below header */
.main {
  display: flex;
  background: #FCECDD;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
  overflow: hidden;
  width: 90%;
  max-width: 900px;
  height: 80vh; /* responsive height */
  margin-top: 100px; /* 👈 creates gap below header */
}

/* sidebar */
.sidebar {
  background: #1e3a8a;
  color: white;
  padding: 20px;
  width: 250px;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: stretch;
  border-right: 2px solid #133b6d;
  border-top-left-radius: 20px;
  border-bottom-left-radius: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
  text-align: center;
}

.sidebar button {
  background: #2563eb;
  border: none;
  border-radius: 10px;
  color: white;
  padding: 10px 15px;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.3s;
}

.sidebar button:hover {
  background: #1e40af;
}

/* content area */
.content {
  flex: 1;
  padding: 30px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  overflow-y: auto; /* 👈 scrolls if content exceeds height */
}

.content h2 {
  color: #1e3a8a;
  margin-bottom: 10px;
}

.badge {
  background: red;
  color: white;
  border-radius: 50%;
  padding: 3px 7px;
  font-size: 12px;
  margin-left: 5px;
}

/* ✅ responsive behavior */
@media (max-width: 768px) {
  .main {
    flex-direction: column;
    width: 95%;
    height: auto;
  }

  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 2px solid #133b6d;
    border-radius: 20px 20px 0 0;
    align-items: center;
  }

  .sidebar button {
    width: 80%;
  }

  .content {
    height: auto;
    padding: 20px;
  }
}
/* Ensure all inner pages fit nicely inside the content box */
#content {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-y: auto;
  box-sizing: border-box;
}

#content .page-container {
  width: 100%;
  max-width: 700px;
  display: flex;
  justify-content: center;
  align-items: center;
}

#content .container {
  background: #FCECDD;
  border-radius: 20px;
  padding: 2rem;
  width: 100%;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  margin-top: 20px;
  text-align: center;
  vertical-align: middle;
}


  </style>
</head>
<body>
  <div id="header"></div>

  <div class="main">
    <div class="sidebar">
      <h2>My Messages</h2>
      <button onclick="loadPage('inbox.html')">Inbox <span id="inboxBadge" class="badge" style="display:none;">0</span></button>
      <button onclick="loadPage('sent.html')">Sent <span id="sentBadge" class="badge" style="display:none;">0</span></button>
      <button onclick="loadPage('drafts.html')">Drafts <span id="draftBadge" class="badge" style="display:none;">0</span></button>
      <button onclick="loadPage('compose.html')">Compose</button>
      <button onclick="loadPage('anonymousMessage.html')">Anonymous</button>
    </div>

    <div class="content" id="content">
      <h2>Welcome</h2>
      <p>Select a section from the sidebar to begin.</p>
    </div>
  </div>

  <div id="toastContainer"></div>
  <audio id="notifySound" src="sounds/notify.mp3" preload="auto"></audio>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // ✅ Load header
    fetch("header.html")
      .then(res => res.text())
      .then(data => { document.getElementById("header").innerHTML = data; });

    document.addEventListener("submit", (e) => e.preventDefault());

    const API_BASE = "http://localhost:5000";
    const socket = io(API_BASE);
    const userEmail = sessionStorage.getItem("email");
    let socketReady = false;

    // ✅ Ensure join happens only after connection
    socket.on("connect", () => {
      socketReady = true;
      if (userEmail) {
        socket.emit("join", userEmail);
        console.log("✅ Joined private room:", userEmail);
      }
    });

    socket.on("disconnect", () => {
      socketReady = false;
      console.warn("⚠️ Socket disconnected");
    });

    // ✅ Toasts
    function showToast(message) {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerText = message;
      container.appendChild(toast);

      const sound = document.getElementById("notifySound");
      if (sound) { sound.currentTime = 0; sound.play().catch(()=>{}); }

      setTimeout(() => toast.remove(), 5000);
    }

    // ✅ Dynamic partial loader
    async function loadPage(page) {
      try {
        const res = await fetch(page, { cache: "no-store" });
        const html = await res.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        document.getElementById("content").innerHTML = doc.body.innerHTML;

        // re-run scripts
        const scripts = doc.querySelectorAll("script");
        scripts.forEach(oldScript => {
          const newScript = document.createElement("script");
          if (oldScript.src) newScript.src = oldScript.src;
          newScript.textContent = oldScript.textContent;
          document.body.appendChild(newScript);
        });
      } catch (err) {
        console.error("Page load error:", err);
      }
    }

    // ✅ Socket Event Handling
    socket.on("newMessage", (msg) => {
      if (msg.recipientEmail === userEmail) {
        showToast(`📩 New message from ${msg.senderEmail || "Anonymous"}`);
        const inboxBadge = document.getElementById("inboxBadge");
        
      }
    });

    socket.on("messageSent", (msg) => {
      if (msg.senderEmail === userEmail) {
        showToast(`✅ Message delivered to ${msg.recipientEmail}`);
      }
    });

    socket.on("messageRejected", (msg) => {
      if (msg.senderEmail === userEmail) {
        showToast(`🚫 Message rejected by moderation`);
      }
    });
  </script>
</body>
</html>
