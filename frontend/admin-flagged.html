<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Flagged Messages | SAMVAAD</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body.dark {
      background-color: #1a1a2e;
      color: #eaeaea;
    }
    .dark .card { background-color: #2e2e48; color: #eee; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="flex justify-between items-center px-6 py-4 bg-blue-600 text-white shadow-md">
    <h1 class="text-2xl font-bold">Admin Dashboard - Flagged Messages</h1>
    <div class="flex gap-4">
      <button id="darkToggle" class="bg-gray-800 px-3 py-1 rounded">🌓 Dark</button>
      <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded">Logout</button>
    </div>
  </header>

  <!-- Main Section -->
  <main class="p-6">
    <h2 class="text-xl font-semibold mb-4">🚨 Flagged Messages</h2>
    <div id="flaggedContainer" class="grid gap-4">
      <p>Loading flagged messages...</p>
    </div>
  </main>

  <script>
    const API_BASE = "http://localhost:5000";

    // ✅ Auth check
    const token = sessionStorage.getItem("token");
    const role = sessionStorage.getItem("role");
    if (!token || role !== "admin") {
      alert("Access denied! Admins only.");
      window.location.href = "login.html";
    }

    // 🌙 Dark mode toggle
    const darkToggle = document.getElementById("darkToggle");
    if (sessionStorage.getItem("theme") === "dark") document.body.classList.add("dark");
    darkToggle.onclick = () => {
      document.body.classList.toggle("dark");
      sessionStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    };

    // 🚪 Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "login.html";
    });

    // 🧾 Fetch all flagged messages
    async function loadFlagged() {
      try {
        const res = await fetch(`${API_BASE}/api/messages/flagged`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await res.json();
        const container = document.getElementById("flaggedContainer");
        container.innerHTML = "";

        if (!data.length) {
          container.innerHTML = "<p class='text-gray-500'>✅ No flagged messages found.</p>";
          return;
        }

        data.forEach(msg => {
          const card = document.createElement("div");
          card.className = "card bg-white shadow-md rounded-lg p-4 border";

          const sender =
            msg.senderAccount
              ? `${msg.senderAccount.username || msg.senderAccount.email} (${msg.senderAccount.role})`
              : "Anonymous";

          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <h3 class="text-lg font-semibold text-red-600">🚨 ${msg.abuseReason || "Flagged Content"}</h3>
                <p class="text-sm text-gray-600">To: ${msg.recipient}</p>
                <p class="mt-2"><strong>Sender:</strong> ${sender}</p>
                ${msg.anonymousHash ? `<p class="text-xs text-gray-400">AnonHash: ${msg.anonymousHash}</p>` : ""}
              </div>
              <small class="text-gray-500">${new Date(msg.createdAt).toLocaleString()}</small>
            </div>
            <p class="mt-3 bg-gray-100 p-3 rounded text-sm">${msg.content}</p>

            <div class="mt-4 flex gap-3">
              ${
                msg.senderAccount
                  ? `<button class="block-btn bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded" data-id="${msg.senderAccount._id}">Block User</button>`
                  : `<button class="block-anon-btn bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded" data-hash="${msg.anonymousHash}">Block Anonymous</button>`
              }
            </div>
          `;

          container.appendChild(card);
        });

        // Attach block handlers
        document.querySelectorAll(".block-btn").forEach(btn =>
          btn.addEventListener("click", async (e) => {
            const id = e.target.dataset.id;
            if (!confirm("Are you sure you want to block this user?")) return;
            await blockUser(id);
          })
        );

        document.querySelectorAll(".block-anon-btn").forEach(btn =>
          btn.addEventListener("click", async (e) => {
            const hash = e.target.dataset.hash;
            if (!confirm("Block this anonymous sender?")) return;
            await blockAnon(hash);
          })
        );

      } catch (err) {
        console.error("Error loading flagged:", err);
        document.getElementById("flaggedContainer").innerHTML = "<p class='text-red-500'>Failed to load flagged messages.</p>";
      }
    }

    // 🚫 Block logged-in user
    async function blockUser(id) {
      try {
        const res = await fetch(`${API_BASE}/api/messages/admin/block`, {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ senderAccountId: id })
        });

        const data = await res.json();
        alert(data.message);
        loadFlagged();
      } catch (err) {
        alert("Failed to block user.");
      }
    }

    // 🚫 Block anonymous sender
    async function blockAnon(hash) {
      try {
        const res = await fetch(`${API_BASE}/api/messages/admin/block`, {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ anonymousHash: hash })
        });

        const data = await res.json();
        alert(data.message);
        loadFlagged();
      } catch (err) {
        alert("Failed to block anonymous sender.");
      }
    }

    // Initialize
    loadFlagged();
  </script>
</body>
</html>
