<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📝 Drafts - SAMVAAD</title>
</head>
<body>
  <div class="drafts-wrapper">
    <div class="drafts-container">
      <h2>📝 My Drafts</h2>
      <p>Click on a draft to continue editing it.</p>

      <div id="draftList" class="message-list"></div>
      <div id="statusMsg" class="footer"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const API_BASE = "http://localhost:5000";
    const token = sessionStorage.getItem("token");
    const userEmail = sessionStorage.getItem("email");
    if (!token) window.location.href = "login.html";

    const socket = io(API_BASE);
    if (userEmail) socket.emit("join", userEmail);

    const list = document.getElementById("draftList");
    const statusMsg = document.getElementById("statusMsg");

    async function loadDrafts() {
      try {
        const res = await fetch(`${API_BASE}/api/messages/drafts`, {
          headers: { "Authorization": `Bearer ${token}` },
        });
        const drafts = await res.json();
        list.innerHTML = "";

        if (!drafts.length) {
          statusMsg.textContent = "No drafts saved yet.";
          return;
        }

        drafts.forEach(addDraft);
        statusMsg.textContent = "";
      } catch (err) {
        console.error(err);
        statusMsg.textContent = "⚠️ Failed to load drafts.";
      }
    }

    function addDraft(draft) {
      const div = document.createElement("div");
      div.className = "message-card";
      div.innerHTML = `
        <strong>${draft.anonymous ? "🕵️ Anonymous Draft" : "✉ Normal Draft"}</strong><br>
        <span><b>To:</b> ${draft.recipientEmail || "(No recipient)"}</span><br>
        <p>${draft.content.length > 100 ? draft.content.slice(0, 100) + "..." : draft.content}</p>
        <small>Saved on: ${new Date(draft.createdAt).toLocaleString()}</small>
      `;

      // 🖋️ Click to edit
      div.addEventListener("click", () => openDraft(draft));
      list.prepend(div);
    }

    // 🪄 Opens the correct editor and fills the content
    function openDraft(draft) {
      sessionStorage.setItem("draftToEdit", JSON.stringify(draft));
      if (draft.anonymous) {
        window.parent.loadPage("anonymousMessage.html");
      } else {
        window.parent.loadPage("compose.html");
      }
    }

    // Optional: real-time updates for new drafts
    socket.on("draftSaved", (draft) => {
      if (draft.senderEmail === userEmail) {
        addDraft(draft);
      }
    });

    loadDrafts();
  </script>

  <style>
    .drafts-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .drafts-container {
      background: #FCECDD;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
      border-radius: 20px;
      text-align: left;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    h2 {
      color: #1e3a8a;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      color: #555;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
    }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 5px;
    }

    .message-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .message-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .message-card strong {
      color: #1e3a8a;
      display: block;
      margin-bottom: 5px;
    }

    .message-card span {
      color: #333;
      display: block;
      margin-bottom: 5px;
    }

    .message-card p {
      color: #444;
      margin: 5px 0;
      line-height: 1.4;
    }

    .message-card small {
      color: #666;
      font-size: 12px;
    }

    .footer {
      margin-top: 15px;
      color: #444;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .drafts-container {
        width: 95%;
        padding: 1.5rem;
      }
    }
  </style>
</body>
</html>
