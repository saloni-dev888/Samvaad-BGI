<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🕵️ Send Anonymous Message - SAMVAAD</title>
</head>
<body>
  <div class="compose-wrapper">
    <div class="compose-container">
      <h2>🕵️ Send Anonymous Message</h2>
      <p>Select a recipient and type your message</p>

      <form id="messageForm" autocomplete="off">
        <input id="recipientEmail" placeholder="Enter Recipient Email" required>
        <input id="senderDetails" placeholder="(Optional) Enter an alias">
        <textarea id="message" rows="6" placeholder="Type your message..." required></textarea>

        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button type="submit" class="btn">Send Message</button>
          <button type="button" id="saveDraftBtn" class="btn-secondary">💾 Save Draft</button>
        </div>
      </form>

      <div id="result" class="footer"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
(() => {
  const API_BASE = "http://localhost:5000";
  const token = sessionStorage.getItem("token");
  const userEmail = sessionStorage.getItem("email");

  if (!token) {
    document.getElementById("result").textContent = "Please login.";
    return;
  }

  const resultDiv = document.getElementById("result");
  const socket = io(API_BASE);
  if (userEmail) socket.emit("join", userEmail);

  // Prefill for reply / resend / draft edit
  const recipientField = document.getElementById("recipientEmail");
  const senderField = document.getElementById("senderDetails");
  const messageField = document.getElementById("message");

  const replyTo = sessionStorage.getItem("replyTo");
  const replySubject = sessionStorage.getItem("replySubject");
  const resendTo = sessionStorage.getItem("resendTo");
  const resendContent = sessionStorage.getItem("resendContent");
  const draftToEdit = sessionStorage.getItem("draftToEdit");

  if (replyTo) {
    recipientField.value = replyTo;
    messageField.value = `\n\n--- Previous Message ---\n${replySubject}\n\n`;
    sessionStorage.removeItem("replyTo");
    sessionStorage.removeItem("replySubject");
  } else if (resendTo) {
    recipientField.value = resendTo;
    messageField.value = resendContent || "";
    sessionStorage.removeItem("resendTo");
    sessionStorage.removeItem("resendContent");
  } else if (draftToEdit) {
    const draft = JSON.parse(draftToEdit);
    recipientField.value = draft.recipientEmail || "";
    messageField.value = draft.content || "";
    senderField.value = draft.senderDetails || "";
    sessionStorage.removeItem("draftToEdit");
  }

  // ✅ SEND anonymous message
  document.getElementById("messageForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    resultDiv.style.color = "#555";
    resultDiv.textContent = "⏳ Sending...";

    const recipientEmail = recipientField.value.trim();
    const content = messageField.value.trim();
    const senderDetails = senderField.value.trim();

    if (!recipientEmail || !content) {
      resultDiv.style.color = "red";
      resultDiv.textContent = "⚠️ Please fill required fields.";
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/api/messages`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({
          recipientEmail,
          content,
          anonymous: true,
          senderDetails,
        }),
      });

      const data = await res.json();
      if (res.ok) {
        resultDiv.style.color = "green";
        resultDiv.textContent = `✅ Message sent to ${recipientEmail}.`;
        document.getElementById("messageForm").reset();
      } else {
        resultDiv.style.color = "red";
        resultDiv.textContent = "❌ " + (data.message || "Failed");
      }
    } catch (err) {
      console.error(err);
      resultDiv.style.color = "red";
      resultDiv.textContent = "⚠️ Network error.";
    }
  });

  // ✅ SAVE as draft
  document.getElementById("saveDraftBtn").addEventListener("click", async () => {
    const recipientEmail = recipientField.value.trim();
    const content = messageField.value.trim();

    if (!content) {
      resultDiv.style.color = "red";
      resultDiv.textContent = "⚠️ Cannot save empty draft.";
      return;
    }

    resultDiv.style.color = "#555";
    resultDiv.textContent = "💾 Saving draft...";

    try {
      const res = await fetch(`${API_BASE}/api/messages/draft`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({ recipientEmail, content }),
      });

      const data = await res.json();
      if (res.ok) {
        resultDiv.style.color = "green";
        resultDiv.textContent = "📝 Draft saved successfully.";
        document.getElementById("messageForm").reset();
      } else {
        resultDiv.style.color = "red";
        resultDiv.textContent = "❌ " + (data.message || "Failed to save draft.");
      }
    } catch (err) {
      console.error(err);
      resultDiv.style.color = "red";
      resultDiv.textContent = "⚠️ Network error.";
    }
  });
})();
  </script>

  <style>
    .compose-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .compose-container {
      background: #FCECDD;
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    h2 { color: #1e3a8a; margin-bottom: 10px; }
    p { color: #555; font-size: 14px; margin-bottom: 20px; }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 15px;
      outline: none;
      font-size: 14px;
      resize: vertical;
    }

    .btn, .btn-secondary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn {
      background: #2563eb;
      color: white;
    }

    .btn:hover {
      background: #1e40af;
    }

    .btn-secondary {
      background: #6b7280;
      color: white;
    }

    .footer {
      margin-top: 15px;
      color: #444;
      font-size: 14px;
      min-height: 20px;
    }

    @media (max-width: 768px) {
      .compose-container {
        width: 95%;
        padding: 1.5rem;
      }
    }
  </style>
</body>
</html>
